<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dawn sky gradient: deep navy → rich purple → burnt orange → warm gold -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d0a2e"/>
      <stop offset="42%"  stop-color="#2d1b5e"/>
      <stop offset="70%"  stop-color="#9b3a1e"/>
      <stop offset="100%" stop-color="#f4a03a"/>
    </linearGradient>

    <!-- Warm horizon glow beneath the drop -->
    <radialGradient id="horizonGlow" cx="50%" cy="80%" r="55%">
      <stop offset="0%"   stop-color="#fcd57a" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#f4844a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f4844a" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop frosted-glass fill: subtle warm white -->
    <linearGradient id="dropFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.20)"/>
      <stop offset="100%" stop-color="rgba(255,238,190,0.16)"/>
    </linearGradient>

    <!-- Sun glow inside drop -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fde68a" stop-opacity="1.0"/>
      <stop offset="40%"  stop-color="#fbbf24" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>

    <!-- Blur for glow effects -->
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="sunBlur" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <!-- Drop clip mask -->
    <clipPath id="dropClip">
      <!-- Drop shape: pointed top, round bottom. Centered at 512,512. -->
      <path d="
        M512 110
        C512 110, 288 420, 288 580
        C288 710 392 816 512 816
        C632 816 736 710 736 580
        C736 420 512 110 512 110
        Z
      "/>
    </clipPath>
  </defs>

  <!-- 1. Sky background -->
  <rect width="1024" height="1024" fill="url(#sky)"/>

  <!-- 2. Horizon warm glow -->
  <rect width="1024" height="1024" fill="url(#horizonGlow)"/>

  <!-- 3. Star field (subtle dots in the upper sky) -->
  <g opacity="0.6">
    <circle cx="120" cy="80"  r="1.5" fill="white" opacity="0.7"/>
    <circle cx="220" cy="50"  r="1"   fill="white" opacity="0.5"/>
    <circle cx="340" cy="110" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="160" cy="180" r="1"   fill="white" opacity="0.4"/>
    <circle cx="450" cy="70"  r="1"   fill="white" opacity="0.6"/>
    <circle cx="580" cy="90"  r="1.5" fill="white" opacity="0.7"/>
    <circle cx="700" cy="55"  r="1"   fill="white" opacity="0.5"/>
    <circle cx="820" cy="130" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="900" cy="80"  r="1"   fill="white" opacity="0.4"/>
    <circle cx="960" cy="200" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="80"  cy="300" r="1"   fill="white" opacity="0.3"/>
    <circle cx="250" cy="250" r="1.5" fill="white" opacity="0.5"/>
    <circle cx="750" cy="200" r="1"   fill="white" opacity="0.4"/>
    <circle cx="950" cy="340" r="1"   fill="white" opacity="0.3"/>
  </g>

  <!-- 4. Drop frosted glass body -->
  <path d="
    M512 110
    C512 110, 288 420, 288 580
    C288 710 392 816 512 816
    C632 816 736 710 736 580
    C736 420 512 110 512 110
    Z
  " fill="url(#dropFill)" stroke="rgba(255,255,255,0.30)" stroke-width="3"/>

  <!-- 5. Inside the drop: sunrise scene -->
  <g clip-path="url(#dropClip)">

    <!-- Sky-meets-land warm band below horizon -->
    <rect x="288" y="622" width="448" height="200" fill="rgba(244,160,58,0.28)"/>

    <!-- Sun atmospheric glow (blurred, behind sun) -->
    <circle cx="512" cy="622" r="90" fill="url(#sunGlow)" filter="url(#sunBlur)" opacity="0.9"/>

    <!-- Sun disc -->
    <circle cx="512" cy="622" r="52" fill="#fde68a"/>
    <circle cx="512" cy="622" r="40" fill="#fbbf24"/>
    <circle cx="512" cy="622" r="30" fill="#f59e0b"/>

    <!-- Horizon line -->
    <line x1="288" y1="622" x2="736" y2="622"
          stroke="rgba(255,255,255,0.55)" stroke-width="2.5"/>

    <!-- Light ray shafts (subtle) -->
    <g opacity="0.12">
      <line x1="512" y1="622" x2="320" y2="420" stroke="white" stroke-width="18"/>
      <line x1="512" y1="622" x2="420" y2="390" stroke="white" stroke-width="12"/>
      <line x1="512" y1="622" x2="512" y2="380" stroke="white" stroke-width="14"/>
      <line x1="512" y1="622" x2="604" y2="390" stroke="white" stroke-width="12"/>
      <line x1="512" y1="622" x2="704" y2="420" stroke="white" stroke-width="18"/>
    </g>
  </g>

  <!-- 6. Drop outer border: crisp white edge -->
  <path d="
    M512 110
    C512 110, 288 420, 288 580
    C288 710 392 816 512 816
    C632 816 736 710 736 580
    C736 420 512 110 512 110
    Z
  " fill="none" stroke="rgba(255,255,255,0.50)" stroke-width="4"/>

  <!-- 7. Specular highlight: left-edge catch light -->
  <path d="M484 160 C476 220, 350 400, 340 510"
        fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="14"
        stroke-linecap="round"/>
  <path d="M490 145 C483 200, 362 380, 352 475"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="22"
        stroke-linecap="round"/>
</svg>
