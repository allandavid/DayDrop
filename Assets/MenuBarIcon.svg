<svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg">
  <!--
    DayDrop menu bar icon.
    Used as an NSImage template image — macOS renders it in the correct
    system colour (white on dark, black on light) automatically.

    To use in Xcode:
    1. Add this file to your Asset Catalog as an Image Set
    2. Set "Render As" to "Template Image"
    3. Load in code: NSImage(named: "MenuBarIcon")
  -->

  <!-- Drop outline: pointed tip at top, rounded bottom -->
  <path
    d="M11 2 C11 2, 4.5 9, 4.5 13.5 C4.5 17.1 7.4 20 11 20 C14.6 20 17.5 17.1 17.5 13.5 C17.5 9 11 2 11 2 Z"
    fill="black"
    stroke="none"
  />

  <!-- Knock-out: horizon line and rising sun arc (creates white negative space inside the filled drop) -->

  <!-- Horizon line knock-out -->
  <rect x="5.5" y="13" width="11" height="1.3" fill="white" rx="0.65"/>

  <!-- Rising sun semicircle knock-out (arc above horizon line) -->
  <path
    d="M7.2 13 A3.8 3.8 0 0 1 14.8 13"
    fill="none"
    stroke="white"
    stroke-width="1.3"
    stroke-linecap="round"
  />

  <!-- Sun dot knock-out at top of arc -->
  <circle cx="11" cy="9.8" r="1.1" fill="white"/>
</svg>
